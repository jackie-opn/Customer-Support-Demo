<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        background-color: #e8e8e8;
        line-height: 1.5;
    }

    .side-bar {
        width: 100%;
        max-width: 100%;
        min-height: 100%;
    }

    .side-bar-header {
        padding: 12px 14px;
        flex-shrink: 0;
        border-bottom: 1px solid #e0e4e8;
    }

    .header-title {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        line-height: 1.3;
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
    }

    .header-logo-wrap {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        border: 1px solid #e0e4e8;
        flex-shrink: 0;
    }

    .header-logo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
    }

    .side-bar-actions {
        margin: 16px;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        flex-shrink: 0;
    }

    .action-title {
        font-size: 18px;
        font-weight: 800;
        color: #fea436;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }

    .action-btns {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
        gap: 8px;
    }

    .action-btn {
        width: 100%;
        max-width: 100%;
        word-break: break-word;
        box-sizing: border-box;
        padding: 11px 14px;
        margin-bottom: 0;
        background: linear-gradient(135deg, #fff5eb 0%, #ffe8d0 100%);
        border: 1px solid #fea436;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        color: #1a1a1a;
        transition: all 0.2s ease;
        text-align: center;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .action-btn:hover {
        background-color: #f59a1f;
        border-color: #f9e7d2;
    }

    .chat-section {
        margin: 0;
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        border-top: 1px solid #e0e4e8;
        background-color: #f5f6f8;
        overflow: hidden;
    }

    .chat-header {
        padding: 10px 16px;
        border-bottom: 1px solid #e0e4e8;
        font-size: 12px;
        font-weight: 700;
        color: #5c6570;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        background: #fafbfc;
        flex-shrink: 0;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 12px 8px;
    }

    .chat-placeholder {
        align-self: center;
        margin-top: 4px;
        padding: 8px 12px;
        font-size: 12px;
        color: #8b949e;
        text-align: center;
        max-width: 90%;
    }

    .message {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        max-width: 100%;
    }

    .chat-input-section {
        padding: 10px 12px 12px;
        background: #fafbfc;
        border-top: 1px solid #e0e4e8;
        flex-shrink: 0;
    }

    .chat-input-wrapper {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        background: #fff;
        border: 1px solid #d0d7de;
        border-radius: 10px;
        padding: 6px 8px;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.03);
    }

    .chat-input {
        flex: 1;
        min-height: 36px;
        max-height: 80px;
        padding: 8px 6px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        color: #1a1a1a;
        resize: none;
        background: transparent;
    }

    .chat-input:focus {
        outline: none;
    }

    .chat-input-wrapper:focus-within {
        border-color: #fea436;
        box-shadow: 0 0 0 2px rgba(254, 164, 54, 0.15);
    }

    .chat-send-btn {
        padding: 8px 12px;
        background: #fea436;
        color: #1a1a1a;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        flex-shrink: 0;
        transition: background 0.15s ease;
    }

    .chat-send-btn:hover {
        background: #f59a1f;
    }

    ::-webkit-scrollbar {
        width: 6px;
    }

    ::-webkit-scrollbar-thumb {
        background: #c8d0d8;
        border-radius: 3px;
    }
    
</style>
<body>
    <div class="side-bar">
        <div class="side-bar-header">
            <div class="header-title">
                Omise AI Assistant
                <span class="header-logo-wrap">
                    <img src="https://assets-cdn.omise.co/assets/company-logos/symbol-dark.png" alt="Omise">
                </span>
            </div>
        </div>

        <div class="side-bar-actions">
            <div class="action-title">AI Quick Actions</div>
            <div class="action-btns">
                <button class="action-btn">AI Summary</button>
                <button class="action-btn">AI Tagging</button>
                <button class="action-btn">AI Draft</button>
                <button class="action-btn">Custom Fields Quick Fill</button>
                <button class="action-btn">Merchant Overview</button>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header">Chat with AI</div>
            <div class="chat-messages">
                <div class="chat-placeholder">Ask me anything about this conversation!</div>
            </div>

            <div class="chat-input-section">
                <div class="chat-input-wrapper">
                    <textarea class="chat-input" id="chat-input" placeholder="Type your message here..."></textarea>
                    <button class="chat-send-btn" id="chat-send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import HelpScout from 'https://esm.sh/@helpscout/javascript-sdk';

        const root = document.querySelector('.side-bar');
        function syncAppHeight() {
            if (!root) return;
            const h = Math.ceil(root.getBoundingClientRect().height);
            HelpScout.setAppHeight(Math.max(h, 520));
        }
        syncAppHeight();
        window.addEventListener('resize', syncAppHeight);
        if (root && typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(syncAppHeight).observe(root);
        }
      
        const MERCHANT_PANEL_URL = 'https://jackie-opn.github.io/Customer-Support-Demo/merchant.html';
      
        document.querySelectorAll('.action-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            if (btn.textContent.trim() === 'Merchant Overview') {
              HelpScout.openSidePanel(MERCHANT_PANEL_URL);
            }
          });
        });
      </script>
</body>
</html>
